<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio Coming Soon</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html { height: 100%; font-family: 'Montserrat', sans-serif; }
    .bg {
      background: url('/assets/wild.jpg') center/cover no-repeat;
      height: 100%; position: relative;
    }
    .overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.7);
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      color: #fff; text-align: center; padding: 0 20px;
    }
    h1 { font-size: 3rem; letter-spacing: 2px; margin-bottom: 20px; text-transform: uppercase; }
    p.subtitle { font-size: 1.2rem; margin-bottom: 30px; max-width: 600px; }
    .countdown { display: flex; gap: 15px; margin-bottom: 30px; }
    .countdown div { background: rgba(255,255,255,0.2); padding: 15px; border-radius: 8px; min-width: 60px; }
    .countdown div span { display: block; font-size: 2rem; font-weight: 700; }
    .countdown div small { text-transform: uppercase; font-size: 0.75rem; }
    .subscribe {
      display: flex; max-width: 400px; width: 100%; margin-bottom: 30px;
    }
    .subscribe input[type="email"] {
      flex: 1; padding: 12px 15px; border: none; border-radius: 4px 0 0 4px;
      font-size: 1rem;
    }
    .subscribe button {
      padding: 12px 20px; border: none; background: #ff6b6b;
      color: #fff; font-size: 1rem; cursor: pointer;
      border-radius: 0 4px 4px 0; transition: background 0.3s;
    }
    .subscribe button:hover { background: #ee5253; }
    .socials a { margin: 0 10px; color: #fff; font-size: 1.5rem; text-decoration: none; transition: transform 0.3s; }
    .socials a:hover { transform: scale(1.2); }
    @media (max-width: 600px) {
      h1 { font-size: 2.2rem; }
      .countdown { flex-direction: column; gap: 10px; }
      .subscribe { flex-direction: column; }
      .subscribe input, .subscribe button { border-radius: 4px; width: 100%; margin: 5px 0; }
    }
  </style>
</head>
<body>
  <div class="bg">
    <div class="overlay">
      <h1>Portfolio Coming Soon</h1>
      <p class="subtitle">Welcome to my world of creativity, photography & media. Stay tuned for the full portfolio launch.</p>
      <div class="countdown" id="countdown">
        <div><span id="days">00</span><small>Days</small></div>
        <div><span id="hours">00</span><small>Hours</small></div>
        <div><span id="minutes">00</span><small>Minutes</small></div>
        <div><span id="seconds">00</span><small>Seconds</small></div>
      </div>
      <form class="subscribe" onsubmit="event.preventDefault(); alert('Thank you!');">
        <input type="email" placeholder="Your email address" required />
        <button type="submit">Notify Me</button>
      </form>
      <div class="socials">
        <a href="#" aria-label="Behance"><i class="fab fa-behance"></i></a>
        <a href="#" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
        <a href="#" aria-label="Dribbble"><i class="fab fa-dribbble"></i></a>
      </div>
    </div>
  </div>

  <!-- Font Awesome -->
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
  <script>
    const launchDate = new Date('2025-05-31T00:00:00');

    function updateCountdown() {
      const now = new Date();
      const diff = launchDate - now;
      if (diff <= 0) return;
      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((diff / (1000 * 60)) % 60);
      const seconds = Math.floor((diff / 1000) % 60);

      document.getElementById('days').textContent = String(days).padStart(2, '0');
      document.getElementById('hours').textContent = String(hours).padStart(2, '0');
      document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
      document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
